name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          repository_name="${{ vars.DOCKERHUB_REPOSITORY }}"
          dockerhub_username="${{ secrets.DOCKERHUB_USERNAME }}"

          if [ -z "$repository_name" ]; then
            repository_name="${GITHUB_REPOSITORY##*/}"
          fi

          if [ -z "$dockerhub_username" ]; then
            dockerhub_username="local"
          fi

          image_name="${dockerhub_username}/${repository_name}"
          image_name="$(echo "$image_name" | tr '[:upper:]' '[:lower:]')"
          echo "name=$image_name" >> "$GITHUB_OUTPUT"

      - name: Validate Docker Hub configuration
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || { echo "Missing secret: DOCKERHUB_USERNAME"; exit 1; }
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || { echo "Missing secret: DOCKERHUB_TOKEN"; exit 1; }

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

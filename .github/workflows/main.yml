name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: graphiQl_nodejs_example
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || vars.DOCKER_USERNAME || secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN || secrets.DOCKER_PASSWORD }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub credentials
        run: |
          test -n "${DOCKERHUB_USERNAME}" || {
            echo "Docker username is empty. Configure DOCKERHUB_USERNAME or DOCKER_USERNAME as a repository secret or variable."
            exit 1
          }
          test -n "${DOCKERHUB_TOKEN}" || {
            echo "Docker token/password is empty. Configure DOCKERHUB_TOKEN, DOCKER_TOKEN or DOCKER_PASSWORD as a repository secret."
            exit 1
          }

      - name: Prepare image namespace
        run: |
          namespace="$(printf '%s' "${DOCKERHUB_USERNAME}" | tr '[:upper:]' '[:lower:]')"

          if ! printf '%s' "${namespace}" | grep -Eq '^[a-z0-9]+[a-z0-9_-]*$'; then
            echo "Docker username must be a valid Docker Hub namespace, for example: rafysanchez"
            exit 1
          fi

          echo "IMAGE_REPO=${namespace}/${IMAGE_NAME}" >> "${GITHUB_ENV}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
